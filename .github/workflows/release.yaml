name: Release

on:
  push:
    branches: [release/*, test-release/*]

permissions: { }

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
