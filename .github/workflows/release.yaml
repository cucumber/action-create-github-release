name: Release

on:
  push:
    branches: [release/*, test-release/*]

permissions: { }

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
